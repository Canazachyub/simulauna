<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Orbits -->
  <g fill="none">
    <ellipse cx="120" cy="120" rx="95" ry="36"/>
    <ellipse cx="120" cy="120" rx="95" ry="36" transform="rotate(60 120 120)"/>
    <ellipse cx="120" cy="120" rx="95" ry="36" transform="rotate(-60 120 120)">
      <animateTransform attributeName="transform" type="rotate" from="0 120 120" to="360 120 120" dur="12s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Electrons -->
  <circle cx="215" cy="120" r="6" fill="currentColor"/>
  <circle cx="72" cy="37" r="6" fill="currentColor"/>
  <circle cx="168" cy="203" r="6" fill="currentColor"/>

  <!-- Nucleus -->
  <circle cx="120" cy="120" r="14" fill="currentColor"/>
  <circle cx="120" cy="120" r="8" fill="#ffffff" stroke="none"/>
</svg>
