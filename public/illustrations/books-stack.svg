  <g transform="rotate(-3 100 200)">
    <rect x="25" y="185" width="150" height="32" rx="3" fill="#003D7A"/>
    <line x1="32" y1="193" x2="168" y2="193" stroke="#D4AF37" stroke-width="1"/>
