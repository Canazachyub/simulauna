<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" font-family="Arial, sans-serif">
  <!-- Body -->
  <rect x="20" y="20" width="160" height="220" rx="14" fill="#003D7A"/>

  <!-- Screen -->
  <rect x="34" y="36" width="132" height="50" rx="4" fill="#1a3a5c" stroke="#ffffff" stroke-width="1"/>
  <text x="156" y="72" font-size="24" font-weight="bold" fill="#D4AF37" text-anchor="end" stroke="none" font-family="'Courier New', monospace">3000</text>

  <!-- Brand dot -->
  <circle cx="42" cy="100" r="2.5" fill="#D4AF37" stroke="none"/>
  <line x1="50" y1="100" x2="160" y2="100" stroke="#ffffff" stroke-width="0.8"/>

  <!-- Buttons grid 4x5 -->
  <g font-size="14" font-weight="bold" fill="#ffffff" stroke="none" text-anchor="middle">
    <!-- Row 1 -->
    <rect x="34" y="112" width="28" height="22" rx="4" fill="#D4AF37"/>
    <text x="48" y="128" fill="#003D7A">C</text>
    <rect x="68" y="112" width="28" height="22" rx="4" fill="#5B7DA8"/>
    <text x="82" y="128">÷</text>
    <rect x="102" y="112" width="28" height="22" rx="4" fill="#5B7DA8"/>
    <text x="116" y="128">×</text>
    <rect x="136" y="112" width="28" height="22" rx="4" fill="#5B7DA8"/>
    <text x="150" y="128">-</text>

    <!-- Row 2 -->
    <rect x="34" y="140" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="48" y="156">7</text>
    <rect x="68" y="140" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="82" y="156">8</text>
    <rect x="102" y="140" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="116" y="156">9</text>
    <rect x="136" y="140" width="28" height="22" rx="4" fill="#5B7DA8"/>
    <text x="150" y="156">+</text>

    <!-- Row 3 -->
    <rect x="34" y="168" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="48" y="184">4</text>
    <rect x="68" y="168" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="82" y="184">5</text>
    <rect x="102" y="168" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="116" y="184">6</text>
    <rect x="136" y="168" width="28" height="50" rx="4" fill="#E67E22"/>
    <text x="150" y="199">=</text>

    <!-- Row 4 -->
    <rect x="34" y="196" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="48" y="212">1</text>
    <rect x="68" y="196" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="82" y="212">2</text>
    <rect x="102" y="196" width="28" height="22" rx="4" fill="#2a5a8c"/>
    <text x="116" y="212">3</text>

    <!-- Row 5 -->
    <rect x="34" y="224" width="62" height="12" rx="4" fill="#2a5a8c"/>
    <text x="65" y="234" font-size="10">0</text>
    <rect x="102" y="224" width="28" height="12" rx="4" fill="#2a5a8c"/>
    <text x="116" y="234" font-size="10">.</text>
  </g>
</svg>
