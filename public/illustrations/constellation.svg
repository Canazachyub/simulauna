<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <g stroke="currentColor" fill="currentColor">
    <!-- Lineas tenues conectando estrellas -->
    <g stroke="currentColor" stroke-width="0.8" opacity="0.3" fill="none">
      <line x1="80" y1="90" x2="180" y2="150"/>
      <line x1="180" y1="150" x2="300" y2="100"/>
      <line x1="300" y1="100" x2="420" y2="180"/>
      <line x1="420" y1="180" x2="540" y2="120"/>
      <line x1="540" y1="120" x2="680" y2="200"/>
      <line x1="180" y1="150" x2="260" y2="260"/>
      <line x1="420" y1="180" x2="480" y2="300"/>
      <line x1="600" y1="320" x2="680" y2="200"/>
    </g>

    <!-- 18 estrellas pequenas como circulos -->
    <circle cx="80" cy="90" r="2" opacity="0.8"/>
    <circle cx="180" cy="150" r="3" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="100" r="2" opacity="0.7"/>
    <circle cx="420" cy="180" r="3" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="120" r="2" opacity="0.8"/>
    <circle cx="680" cy="200" r="3" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="260" r="2" opacity="0.7"/>
    <circle cx="480" cy="300" r="2.5" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="320" r="2" opacity="0.7"/>
    <circle cx="120" cy="220" r="1.5" opacity="0.6"/>
    <circle cx="220" cy="40" r="1" opacity="0.5"/>
    <circle cx="360" cy="220" r="1.5" opacity="0.6"/>
    <circle cx="520" cy="60" r="1" opacity="0.5"/>
    <circle cx="720" cy="80" r="1.5" opacity="0.6"/>
    <circle cx="40" cy="320" r="1" opacity="0.5"/>
    <circle cx="760" cy="350" r="1.5" opacity="0.6"/>
    <circle cx="340" cy="360" r="1" opacity="0.5"/>
    <circle cx="620" cy="40" r="1.5" opacity="0.6"/>

    <!-- 3 estrellas brillantes con cruz de 4 puntas -->
    <g fill="currentColor">
      <path d="M 180,130 L 184,150 L 180,170 L 176,150 Z M 160,150 L 180,146 L 200,150 L 180,154 Z"/>
      <path d="M 420,160 L 424,180 L 420,200 L 416,180 Z M 400,180 L 420,176 L 440,180 L 420,184 Z"/>
      <path d="M 680,180 L 684,200 L 680,220 L 676,200 Z M 660,200 L 680,196 L 700,200 L 680,204 Z"/>
    </g>
  </g>
</svg>
