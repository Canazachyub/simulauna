<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cap base (head part) -->
  <path d="M60 95 Q60 80 75 78 L165 78 Q180 80 180 95 L180 115 Q180 130 165 132 Q120 140 75 132 Q60 130 60 115 Z" fill="#003D7A"/>

  <!-- Cap top (mortarboard) -->
  <path d="M15 78 L120 48 L225 78 L120 108 Z" fill="#003D7A"/>
  <path d="M15 78 L120 108 L120 48 Z" fill="#002a56" stroke="#1a1a1a"/>
  <path d="M225 78 L120 108 L120 48 Z" fill="#1a4e8c" stroke="#1a1a1a"/>

  <!-- Button on top -->
  <circle cx="120" cy="78" r="4" fill="#D4AF37" stroke="#1a1a1a"/>

  <!-- Tassel cord -->
  <path d="M120 78 Q145 90 165 100 Q175 105 178 120" stroke="#D4AF37" stroke-width="2" fill="none"/>

  <!-- Tassel head -->
