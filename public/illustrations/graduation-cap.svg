  <!-- Tassel strands -->
  <g stroke="#D4AF37" stroke-width="1.5">
    <line x1="174" y1="128" x2="172" y2="155"/>
    <line x1="176" y1="129" x2="175" y2="158"/>
    <line x1="178" y1="130" x2="178" y2="160"/>
    <line x1="180" y1="129" x2="181" y2="158"/>
    <line x1="182" y1="128" x2="184" y2="155"/>
  </g>
  <!-- Tassel end cap -->
  <ellipse cx="178" cy="160" rx="8" ry="3" fill="#D4AF37" stroke="#1a1a1a"/>
</svg>
