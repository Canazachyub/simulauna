<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <defs>
    <pattern id="andean-tile" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <g stroke="currentColor" fill="none" stroke-width="1.25" stroke-linecap="square" stroke-linejoin="miter" opacity="0.08">
        <!-- Rombo escalonado central (4 capas) -->
        <polygon points="60,12 96,60 60,108 24,60" />
        <polygon points="60,22 86,60 60,98 34,60" />
        <polygon points="60,32 76,60 60,88 44,60" />
        <polygon points="60,44 68,60 60,76 52,60" stroke-width="1" />

        <!-- Hilera superior de triangulos -->
        <polyline points="0,6 10,0 20,6 30,0 40,6 50,0 60,6 70,0 80,6 90,0 100,6 110,0 120,6" />
        <polyline points="0,12 10,6 20,12 30,6 40,12 50,6 60,12 70,6 80,12 90,6 100,12 110,6 120,12" />

        <!-- Hilera inferior de triangulos -->
        <polyline points="0,114 10,120 20,114 30,120 40,114 50,120 60,114 70,120 80,114 90,120 100,114 110,120 120,114" />
        <polyline points="0,108 10,114 20,108 30,114 40,108 50,114 60,108 70,114 80,108 90,114 100,108 110,114 120,108" />

        <!-- Zigzag lateral izquierdo -->
        <polyline points="6,0 0,10 6,20 0,30 6,40 0,50 6,60 0,70 6,80 0,90 6,100 0,110 6,120" />
        <!-- Zigzag lateral derecho -->
        <polyline points="114,0 120,10 114,20 120,30 114,40 120,50 114,60 120,70 114,80 120,90 114,100 120,110 114,120" />

        <!-- Cruces andinas en esquinas (chakana simplificada) -->
        <g stroke-width="1">
          <path d="M14,14 h8 v-4 h4 v4 h4 v4 h-4 v4 h-4 v-4 h-8 z" />
          <path d="M98,14 h8 v-4 h4 v4 h4 v4 h-4 v4 h-4 v-4 h-8 z" />
          <path d="M14,98 h8 v-4 h4 v4 h4 v4 h-4 v4 h-4 v-4 h-8 z" />
          <path d="M98,98 h8 v-4 h4 v4 h4 v4 h-4 v4 h-4 v-4 h-8 z" />
        </g>

        <!-- Pequenos rombos intermedios -->
        <polygon points="30,30 36,36 30,42 24,36" />
        <polygon points="90,30 96,36 90,42 84,36" />
        <polygon points="30,90 36,96 30,102 24,96" />
        <polygon points="90,90 96,96 90,102 84,96" />
      </g>
    </pattern>
  </defs>
  <rect width="120" height="120" fill="url(#andean-tile)" />
</svg>
